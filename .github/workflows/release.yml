name: GitHub Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm test
      - run: npm run check
      - run: npm run release:pack -- --tag "$GITHUB_REF_NAME"
      - name: Create GitHub Release
        run: |
          set -euo pipefail
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists"
            exit 0
          fi
          gh release create "$GITHUB_REF_NAME" dist/agentic-ai.tgz dist/agentic-ai.tgz.sha256 dist/release.json --title "Agentic AI $GITHUB_REF_NAME"
        env:
          GH_TOKEN: ${{ github.token }}
