name: GitHub Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm test
      - run: npm run manifest:sign -- --git-ref "$GITHUB_REF_NAME"
        env:
          REGISTRY_SIGNING_PRIVATE_KEY: ${{ secrets.REGISTRY_SIGNING_PRIVATE_KEY }}
      - run: npm run check
      - run: npm run release:pack -- --tag "$GITHUB_REF_NAME"
      - name: Persist signed manifest to main
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/signed-registry"
          cp registry/manifest.json "$RUNNER_TEMP/signed-registry/manifest.json"
          cp registry/manifest.sig "$RUNNER_TEMP/signed-registry/manifest.sig"

          git fetch origin main --tags
          tag_commit="$(git rev-parse "$GITHUB_REF_NAME^{commit}")"
          main_commit="$(git rev-parse origin/main)"
          if [ "$tag_commit" != "$main_commit" ]; then
            echo "Refusing to update main: $GITHUB_REF_NAME points at $tag_commit but origin/main is $main_commit"
            exit 1
          fi

          git checkout -B main origin/main
          cp "$RUNNER_TEMP/signed-registry/manifest.json" registry/manifest.json
          cp "$RUNNER_TEMP/signed-registry/manifest.sig" registry/manifest.sig
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add registry/manifest.json registry/manifest.sig
          if git diff --cached --quiet; then
            echo "Signed manifest already matches main"
          else
            git commit -m "Commit signed $GITHUB_REF_NAME skill manifest"
            git push origin HEAD:main
          fi
      - run: gh release create "$GITHUB_REF_NAME" dist/agentic-ai.tgz dist/agentic-ai.tgz.sha256 dist/release.json --title "Agentic AI $GITHUB_REF_NAME"
        env:
          GH_TOKEN: ${{ github.token }}
