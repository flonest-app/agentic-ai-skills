name: Validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - run: npm test
      - name: Sign manifest for main validation
        if: github.event_name == 'push'
        run: npm run manifest:sign -- --git-ref "$GITHUB_REF_NAME"
        env:
          REGISTRY_SIGNING_PRIVATE_KEY: ${{ secrets.REGISTRY_SIGNING_PRIVATE_KEY }}
      - run: npm run check
